databases:
  - name: hhbb-db
    plan: free
    databaseName: hhbb_hotel
    user: hhbb_admin

services:
  - type: web
    name: hhbb-hotel
    runtime: node
    plan: free
    buildCommand: cd client && npm ci && npm run build && cd ../server && npm ci --omit=dev
    startCommand: cd server && node src/app.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hhbb-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 10000
